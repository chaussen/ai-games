<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>学字坊 · The Character Forge — Character Studio</title>
<meta name="description" content="The inside of a stage: forge a character six different ways — one per 六书 category (象形 指事 会意 形声 假借 转注). The way you build each one mirrors how it was actually invented." />
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#FFF8F5; --bg-warm:#FBEFE9; --paper:#FFFFFF;
  --ink:#26201E; --ink-soft:#5C504B; --ink-mute:#8E7F79;
  --line:#EFDDD5; --line-soft:#F4E5DE; --gold:#E0A23A;
  --sans:'Manrope',system-ui,-apple-system,sans-serif;
  --serif:'Newsreader','Times New Roman',serif;
  --zh:'Noto Serif SC','Songti SC',serif;
  --rc:#3E8E72; --rc-soft:#BCDDD1; --rc-tint:#E4F1EC;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{margin:0;font-family:var(--sans);color:var(--ink);background:
  radial-gradient(130% 80% at 50% -10%, var(--rc-tint), transparent 60%), var(--bg);
  -webkit-font-smoothing:antialiased;overflow:hidden;user-select:none;-webkit-user-select:none;
  font-size:16px;line-height:1.5;overscroll-behavior:none;transition:background .5s;}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;}
.zh{font-family:var(--zh);font-weight:600;}
.app{position:relative;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;}

/* ───── header ───── */
.topbar{flex-shrink:0;display:flex;align-items:center;gap:18px;padding:13px clamp(16px,3vw,34px);
  background:rgba(255,248,245,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line);z-index:20;}
.brandseal{flex-shrink:0;width:46px;height:46px;border-radius:13px;background:var(--rc);color:#fff;font-size:23px;
  display:flex;align-items:center;justify-content:center;box-shadow:0 12px 24px -14px var(--rc);transition:.4s;}
.title{display:flex;flex-direction:column;line-height:1.15;}
.title b{font-family:var(--serif);font-weight:500;font-size:clamp(16px,2vw,20px);}
.title span{font-size:12px;color:var(--ink-mute);font-weight:600;}
.title span .zh{color:var(--rc);}
.codex{display:flex;gap:7px;margin-left:auto;}
.codex-stamp{position:relative;width:62px;padding:7px 4px 6px;border-radius:12px;background:var(--bg-warm);border:1px dashed var(--line);
  display:flex;flex-direction:column;align-items:center;gap:1px;transition:.2s;opacity:.7;}
.codex-stamp.cur{opacity:1;border-style:solid;border-color:var(--rc-soft);box-shadow:0 8px 18px -12px var(--rc);transform:translateY(-2px);}
.codex-stamp.done{opacity:1;background:var(--rc-tint);border-style:solid;border-color:var(--rc-soft);}
.codex-stamp .cs-cat{font-size:12px;color:var(--rc);font-weight:700;}
.codex-stamp .cs-ch{font-size:20px;line-height:1;color:var(--ink);}
.codex-stamp.done .cs-ch{color:var(--rc);}
.codex-stamp:not(.done) .cs-ch{color:var(--ink-mute);opacity:.5;}
.codex-stamp .cs-en{font-size:8px;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-mute);font-weight:700;text-align:center;line-height:1.1;}
.hcount{display:flex;gap:16px;padding-left:16px;border-left:1px solid var(--line);}
.hcount .hc{display:flex;flex-direction:column;align-items:center;line-height:1;}
.hcount .hc b{font-family:var(--serif);font-size:20px;font-weight:500;color:var(--rc);}
.hcount .hc span{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-mute);font-weight:700;margin-top:3px;}
@media (max-width:980px){ .codex-stamp .cs-en{display:none;} .codex-stamp{width:50px;} }
@media (max-width:740px){ .hcount{display:none;} .title span{display:none;} }

/* ───── arena ───── */
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:clamp(12px,2.2vw,26px);min-height:0;position:relative;}
.arena-head{text-align:center;max-width:640px;}
.cat-badge{display:inline-flex;align-items:baseline;gap:10px;padding:7px 18px;border-radius:999px;background:var(--rc-tint);border:1px solid var(--rc-soft);}
.cat-badge .cb-zh{font-size:20px;color:var(--rc);}
.cat-badge .cb-py{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--rc);}
.cat-badge .cb-en{font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;color:var(--ink-soft);}
.cat-idea{font-size:16px;color:var(--ink-soft);margin:12px auto 0;max-width:54ch;line-height:1.5;text-wrap:pretty;}
.cat-idea b{color:var(--ink);font-weight:700;}
.arena{position:relative;width:min(720px,94vw);min-height:clamp(280px,42vh,400px);display:flex;align-items:center;justify-content:center;}

.howto{position:absolute;bottom:-30px;left:0;right:0;text-align:center;font-size:13.5px;color:var(--ink-mute);font-weight:600;}
.howto b{color:var(--rc);}

/* pieces & zones */
.piece{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  background:var(--paper);border:1px solid var(--rc-soft);border-radius:18px;box-shadow:0 16px 30px -20px rgba(38,32,30,.5);
  cursor:grab;transition:box-shadow .16s, transform .12s;touch-action:none;}
.piece:active,.piece.dragging{cursor:grabbing;}
.piece.dragging{box-shadow:0 28px 44px -18px rgba(38,32,30,.55);transform:scale(1.04);}
.dropzone{position:absolute;border-radius:16px;}

/* ALIGN */
.align-wrap{display:flex;align-items:center;gap:clamp(20px,5vw,70px);}
.picframe{position:relative;width:240px;height:170px;border-radius:18px;background:linear-gradient(180deg,#fff,var(--rc-tint));
  border:1px solid var(--rc-soft);display:flex;align-items:flex-end;justify-content:center;overflow:hidden;}
.picframe .pic{color:var(--rc);width:78%;margin-bottom:6px;opacity:.85;transition:opacity .6s;}
.picframe .pic svg{width:100%;height:auto;display:block;}
.picframe .dropzone{inset:14px;border:2px dashed var(--rc-soft);opacity:.5;}
.pic-cap{position:absolute;top:10px;left:0;right:0;text-align:center;font-size:11px;color:var(--rc);font-weight:700;letter-spacing:.04em;}
.picframe.aligned .pic{opacity:.18;}
.picframe.aligned .dropzone{display:none;}
.overlay-glyph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--zh);
  font-size:120px;color:var(--rc);font-weight:600;animation:stampIn .6s cubic-bezier(.2,.8,.3,1.2);}
@keyframes stampIn{from{transform:scale(1.5) rotate(-8deg);opacity:0;}to{transform:none;opacity:1;}}
.glyphpiece{width:104px;height:104px;}
.glyphpiece .zh{font-size:62px;color:var(--ink);}

/* MARK */
.mark-wrap{display:flex;align-items:center;gap:clamp(20px,5vw,64px);}
.markframe{position:relative;width:170px;height:230px;border-radius:18px;background:linear-gradient(180deg,#fff,var(--rc-tint));border:1px solid var(--rc-soft);
  display:flex;align-items:center;justify-content:center;}
.markframe .basech{font-size:120px;color:var(--ink);line-height:1;}
.markframe .dropzone.mk{left:50%;transform:translateX(-50%);width:120px;height:40px;border:2px dashed var(--rc-soft);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--rc);opacity:.55;}
.markframe .dropzone.top{top:24px;}
.markframe .dropzone.base{bottom:24px;background:var(--rc-tint);opacity:.8;}
.markframe.marked::after{content:"本";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--zh);font-size:120px;color:var(--rc);font-weight:600;background:var(--paper);animation:stampIn .55s cubic-bezier(.2,.8,.3,1.2);}
.markpiece{width:130px;height:64px;}
.markpiece .mark-bar{width:66px;height:9px;border-radius:6px;background:var(--rc);}
.markpiece em{font-style:normal;font-size:11px;color:var(--ink-mute);font-weight:700;text-transform:uppercase;letter-spacing:.06em;}

/* FUSE */
.fuse-wrap{display:flex;align-items:center;gap:clamp(10px,2.4vw,26px);}
.comp{width:120px;height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  background:var(--paper);border:1px solid var(--rc-soft);border-radius:18px;box-shadow:0 16px 30px -20px rgba(38,32,30,.5);cursor:grab;touch-action:none;transition:box-shadow .16s, transform .12s, opacity .3s;}
.comp.dragging{box-shadow:0 28px 44px -18px rgba(38,32,30,.55);transform:scale(1.04);cursor:grabbing;}
.comp .comp-ch{font-family:var(--zh);font-size:58px;color:var(--ink);line-height:1;}
.comp .comp-lb{font-size:10.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--rc);text-align:center;padding:0 6px;}
.comp.onanvil{opacity:.25;transform:scale(.8);}
.comp.fusing{opacity:0;transition:.5s;}
.anvil{position:relative;width:150px;height:150px;border-radius:24px;background:var(--rc-tint);border:2px dashed var(--rc-soft);
  display:flex;align-items:center;justify-content:center;transition:.3s;}
.anvil .anvil-plus{font-size:40px;color:var(--rc);opacity:.5;font-weight:300;}
.anvil .dropzone{inset:0;}
.anvil.fired{background:var(--rc);border-color:var(--rc);box-shadow:0 0 0 10px var(--rc-tint),0 20px 40px -16px var(--rc);}
.anvil.fired .anvil-plus{display:none;}
.anvil.fired::after{content:attr(data-ch);font-family:var(--zh);}

/* BORROW */
.borrow-wrap{display:flex;align-items:center;gap:clamp(20px,5vw,60px);}
.bubble{position:relative;width:260px;padding:22px 22px 26px;border-radius:20px;background:var(--paper);border:1px solid var(--rc-soft);box-shadow:0 16px 30px -20px rgba(38,32,30,.4);text-align:center;}
.bubble::after{content:"";position:absolute;left:-12px;top:46px;border:10px solid transparent;border-right-color:var(--paper);}
.bub-sound{display:block;font-family:var(--serif);font-style:italic;font-size:28px;color:var(--rc);}
.bub-en{display:block;font-size:13px;color:var(--ink-soft);margin:4px 0 14px;}
.bub-en b{color:var(--ink);}
.bub-slot{position:relative;margin:0 auto;width:84px;height:84px;border:2px dashed var(--rc-soft);border-radius:16px;display:flex;align-items:center;justify-content:center;background:var(--rc-tint);}
.bub-slot span{font-size:34px;color:var(--ink-mute);}
.bub-slot.filled{border-style:solid;border-color:var(--rc);background:var(--paper);}
.bub-slot.filled .zh{color:var(--rc);font-size:52px;animation:stampIn .5s cubic-bezier(.2,.8,.3,1.2);}
.wheatpiece{width:160px;padding:18px 14px;}
.wheatpiece .zh{font-size:54px;color:var(--ink);line-height:1;}
.wheatpiece .wheat-lb{font-size:11.5px;color:var(--ink-mute);font-weight:600;text-align:center;line-height:1.4;margin-top:6px;}
.wheatpiece .wheat-lb em{color:var(--rc);font-style:italic;}

/* LINK */
.link-wrap{display:flex;flex-direction:column;align-items:center;gap:22px;}
.rootnote{font-size:13px;color:var(--ink-mute);font-weight:600;font-style:italic;}
.linkrow{display:flex;align-items:center;gap:4px;}
.linkcard{width:140px;padding:22px 14px;border-radius:18px;background:var(--paper);border:1px solid var(--line);text-align:center;transition:.4s;}
.linkcard.lit{border-color:var(--rc);box-shadow:0 14px 28px -16px var(--rc);background:var(--rc-tint);}
.linkcard .zh{font-size:56px;color:var(--ink);line-height:1;display:block;}
.linkcard .lc-py{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--rc);display:block;margin-top:4px;}
.linkcard .lc-en{font-size:12px;color:var(--ink-mute);font-weight:600;display:block;}
.linksvg{width:90px;height:50px;}
.linksvg path{fill:none;stroke:var(--rc-soft);stroke-width:3;stroke-dasharray:6 8;}
.linksvg.drawn path{stroke:var(--rc);stroke-dasharray:200;stroke-dashoffset:200;animation:draw .7s forwards;}
@keyframes draw{to{stroke-dashoffset:0;}}
.linkbtn{padding:13px 24px;border-radius:999px;background:var(--rc);color:#fff;font-weight:700;font-size:15px;box-shadow:0 16px 28px -16px var(--rc);transition:.16s;}
.linkbtn:hover{filter:brightness(.95);}
.linkbtn .zh{font-weight:600;}

/* solo result (already-forged stations) */
.frame.solo{display:flex;align-items:center;justify-content:center;}
.result{text-align:center;}
.result-ch{font-family:var(--zh);font-size:120px;color:var(--rc);line-height:1;font-weight:600;}
.result-meta{display:flex;gap:12px;align-items:baseline;justify-content:center;margin-top:6px;}
.result-py{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--rc);}
.result-en{font-size:18px;color:var(--ink-soft);font-weight:600;}
.result-eq{margin-top:14px;font-size:14px;color:var(--ink-mute);font-weight:600;}
.result-eq b{color:var(--ink);}
.eq-note{font-size:12.5px;}

/* ───── footer: dots + next + strip ───── */
.footer{flex-shrink:0;display:flex;flex-direction:column;gap:0;}
.footbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px clamp(16px,3vw,34px);}
.dots{display:flex;gap:8px;align-items:center;}
.dots i{width:9px;height:9px;border-radius:50%;background:var(--line);transition:.2s;}
.dots i.done{background:var(--rc);}
.dots i.cur{width:26px;border-radius:999px;background:var(--rc);}
.fbtn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:14px;font-weight:700;font-size:15.5px;padding:13px 24px;transition:.16s;border:1px solid transparent;}
.fbtn.solid{background:var(--rc);color:#fff;box-shadow:0 16px 28px -16px var(--rc);}
.fbtn.solid:hover{filter:brightness(.95);}
.fbtn.ghost{background:var(--paper);border-color:var(--line);color:var(--ink-soft);}
.fbtn.ghost:hover{border-color:var(--rc-soft);color:var(--rc);}
.fbtn .zh{font-weight:600;}
.strip{display:flex;gap:10px;align-items:center;padding:12px clamp(16px,3vw,34px);background:var(--paper);border-top:1px solid var(--line);min-height:88px;overflow-x:auto;scrollbar-width:none;}
.strip::-webkit-scrollbar{display:none;}
.strip-empty{color:var(--ink-mute);font-size:13.5px;font-weight:600;font-style:italic;}
.strip-item{flex-shrink:0;width:74px;text-align:center;padding:8px 4px;border-radius:14px;background:var(--rc-tint);border:1px solid var(--rc-soft);transition:.3s;}
.strip-item.pop{animation:pop .55s cubic-bezier(.2,.8,.3,1.2);}
@keyframes pop{0%{transform:scale(0) rotate(-12deg);opacity:0;}60%{transform:scale(1.15);}100%{transform:none;opacity:1;}}
.strip-item .si-motif{height:26px;color:var(--rc);display:flex;align-items:center;justify-content:center;}
.strip-item .si-motif svg{height:26px;width:auto;}
.strip-item .si-ch{font-family:var(--zh);font-size:30px;color:var(--ink);line-height:1.05;}
.strip-item .si-py{font-size:11px;color:var(--rc);font-weight:700;}

/* ───── reveal overlay ───── */
.reveal{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;
  background:radial-gradient(120% 90% at 50% 30%, rgba(255,248,245,.97), rgba(251,239,233,.98));overflow:hidden;}
.reveal.show{display:flex;animation:ovIn .35s ease;}
@keyframes ovIn{from{opacity:0;}to{opacity:1;}}
.rv-card{position:relative;z-index:2;text-align:center;padding:34px 30px;max-width:420px;animation:ovPop .5s cubic-bezier(.2,.8,.3,1.2);}
@keyframes ovPop{from{transform:scale(.86);opacity:0;}to{transform:scale(1);opacity:1;}}
.rv-eyebrow{display:flex;align-items:center;justify-content:center;gap:0;text-transform:uppercase;letter-spacing:.14em;font-size:11px;font-weight:800;color:var(--rc);margin-bottom:14px;}
.rv-eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--rc);margin-right:9px;}
.rv-eyebrow .zh{margin:0 4px;}
.rv-motif{height:46px;color:var(--rc);display:flex;align-items:center;justify-content:center;margin-bottom:6px;}
.rv-motif svg{height:46px;width:auto;}
.rv-ch{font-family:var(--zh);font-size:118px;line-height:1;color:var(--ink);font-weight:600;animation:stampIn .55s cubic-bezier(.2,.8,.3,1.2);}
.rv-py{font-family:var(--serif);font-style:italic;font-size:24px;color:var(--rc);margin-top:2px;}
.rv-en{font-size:16px;color:var(--ink-soft);font-weight:600;}
.rv-eq{margin:14px auto 0;font-size:14px;color:var(--ink-soft);max-width:40ch;line-height:1.5;}
.rv-eq b{color:var(--ink);}
.rv-actions{display:flex;gap:12px;justify-content:center;margin-top:24px;}
.confetti-bit{position:absolute;top:-20px;border-radius:2px;animation:fall linear forwards;z-index:1;}
@keyframes fall{to{transform:translateY(108vh) rotate(560deg);}}
/* finish */
.finish-card{max-width:560px;}
.fin-h{font-family:var(--serif);font-weight:400;font-size:30px;letter-spacing:-.01em;margin:6px 0 8px;}
.fin-h em{font-style:italic;color:var(--rc);}
.fin-p{font-size:15px;color:var(--ink-soft);line-height:1.55;margin:0 auto;max-width:46ch;}
.fin-strip{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:22px 0 4px;}
.fin-item{width:78px;padding:10px 4px;border-radius:14px;background:var(--paper);border:1px solid var(--line);}
.fin-item .si-motif{height:24px;color:var(--rc);display:flex;align-items:center;justify-content:center;}
.fin-item .si-motif svg{height:24px;}
.fin-item .zh{font-size:30px;color:var(--ink);display:block;line-height:1.1;}
.fin-item em{font-style:normal;font-size:12px;color:var(--rc);font-weight:600;}

/* ───── toast ───── */
#ftoast{position:fixed;left:50%;bottom:108px;transform:translate(-50%,28px);z-index:95;background:var(--ink);color:#fff;
  font-size:14px;font-weight:600;padding:12px 22px;border-radius:999px;opacity:0;pointer-events:none;transition:.28s;box-shadow:0 18px 36px -18px rgba(0,0,0,.5);max-width:90vw;}
#ftoast.on{opacity:1;transform:translate(-50%,0);}
#ftoast .zh{font-weight:700;}
</style>
</head>
<body data-anim="on">
<div class="app">
  <header class="topbar">
    <div class="brandseal zh">坊</div>
    <div class="title"><b>The Character Forge</b><span><span class="zh">学字坊</span> · how a character is born</span></div>
    <div class="codex" id="codex"></div>
    <div class="hcount">
      <div class="hc"><b id="forged-v">0</b><span>炼成 / 6</span></div>
      <div class="hc"><b id="score-v">0</b><span>score</span></div>
    </div>
  </header>

  <div class="main">
    <div class="arena-head" id="arena-head"></div>
    <div class="arena" id="arena"></div>
  </div>

  <div class="footer">
    <div class="footbar">
      <div class="dots" id="dots"></div>
      <button class="fbtn solid" id="next" style="display:none">Next</button>
    </div>
    <div class="strip" id="strip"></div>
  </div>
</div>

<div class="reveal" id="reveal"></div>
<div id="ftoast"></div>
<div id="tweaks-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="journey/tweaks-panel.jsx"></script>
<script src="journey/forge.js"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "sound": true,
  "hints": true,
  "anim": true
}/*EDITMODE-END*/;
function ForgeTweaks(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(()=>{ if(window.JOURNEY) window.JOURNEY.applyTweaks(t); }, [t.sound, t.hints, t.anim]);
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="The forge" />
      <TweakToggle label="Speak the character" value={t.sound} onChange={(v)=>setTweak('sound', v)} />
      <TweakToggle label="Show hint labels" value={t.hints} onChange={(v)=>setTweak('hints', v)} />
      <TweakToggle label="Reveal animations" value={t.anim} onChange={(v)=>setTweak('anim', v)} />
      <TweakSection label="Demo" />
      <TweakButton label="Reset forge" onClick={()=>window.JOURNEY && window.JOURNEY.reset()} />
    </TweaksPanel>
  );
}
ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<ForgeTweaks />);
</script>
</body>
</html>

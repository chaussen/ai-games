<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>学字坊 · 假期免费试用 · Free Trial (Book 1)</title>
<meta name="description" content="A free holiday trial of The Character Game (学字坊) — Book 1. The full game is unlocked in class.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23C2603A'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='white' font-family='serif'%3E字%3C/text%3E%3C/svg%3E">
<meta name="theme-color" content="#FFF8F5">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="game/styles.css">
<!-- Free-trial mode: Book 1 only, 14-day per-device clock, no class code. -->
<script>window.GAME_TRIAL = { on:true, book:'b1', days:14 };</script>
</head>
<body data-node="seal" data-path="trail" data-scenery="on" data-bob="on" data-pinyin="on" data-fade="on">

<div class="app">
  <!-- header: rank · XP · 文 wallet · deck · review · seals · streak -->
  <header class="topbar" id="jhead"></header>

  <!-- the handscroll home -->
  <div class="stage" id="stage">
    <div class="scroll-rod rod-left" aria-hidden="true"></div>
    <div id="canvas"></div>
    <div class="scroll-rod rod-right" aria-hidden="true"></div>
  </div>

  <!-- nav + minimap -->
  <div class="navctl">
    <button id="nav-prev" title="Previous chapter" aria-label="Previous chapter">‹</button>
    <button id="nav-here" title="Jump to where you are" aria-label="Jump to where you are">◎</button>
    <button id="nav-next" title="Next chapter" aria-label="Next chapter">›</button>
  </div>
  <div class="minimap" id="minimap"></div>
</div>

<!-- stage sheet (3-band arc) -->
<div id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="sheet__head"></div>
  <div class="sheet__body"></div>
  <div class="sheet__foot"></div>
</div>

<!-- ceremony overlay (stage clear / seal / rank-up) -->
<div class="overlay" id="overlay"></div>

<!-- toast -->
<div id="jtoast"></div>

<!-- trial gate (welcome / expiry) -->
<div class="lockgate" id="lockgate"></div>

<!-- first-paint loader -->
<div id="loading" style="position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:#FFF8F5;color:#8E7F79;font-family:'Newsreader',serif;font-size:20px">
  <span>学字坊 — loading the character graph…</span>
</div>

<script src="assets/stroke-cell.js"></script>
<script src="game/strokeplay.js"></script>
<script src="game/data.js"></script>
<script src="game/state.js"></script>
<script src="game/forge.js"></script>
<script src="game/screens.js"></script>
<script src="game/scroll.js"></script>
<script src="game/trial.js"></script>
<script src="game/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hanzi Sandbox — Phase 3 Room Shell</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #1b1f24; color: #eee; margin: 0; padding: 20px; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: #888; margin-bottom: 16px; font-size: 13px; }
  #obstacle { font-size: 14px; color: #ddd; margin-bottom: 12px; }
  #terrainRow { display: flex; gap: 8px; margin-bottom: 16px; }
  .cell { width: 90px; height: 90px; border: 2px solid #555; border-radius: 8px; display: flex; flex-direction: column;
          align-items: center; justify-content: center; cursor: pointer; position: relative; background: #23272d; }
  .cell.cell-CHASM_SMALL { width: 50px; }
  .cell.cell-CHASM_LARGE { width: 150px; }
  .cell .label { font-size: 10px; color: #999; }
  .cell .mod { font-size: 22px; }
  .cell.spirit-here::after { content: '◉'; position: absolute; top: 2px; right: 4px; color: #E0A82E; }
  #hand { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .stamp { width: 46px; height: 46px; border-radius: 6px; background: #2a2f36; border: 1px solid #555;
           display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; position: relative; }
  .stamp.selected { outline: 2px solid #E0A82E; }
  .stamp.depleted { opacity: 0.3; cursor: not-allowed; }
  .stamp .count { position: absolute; bottom: -2px; right: -2px; font-size: 9px; background: #111; padding: 0 3px; border-radius: 3px; color: #aaa; }
  .stamp .pair-badge { position: absolute; top: -4px; left: -4px; font-size: 9px; background: #4A7C59; color: #fff; padding: 0 3px; border-radius: 3px; }
  .stamp.hint { animation: pulse var(--hint-ms, 1400ms) ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(224,168,46,0); } 50% { box-shadow: 0 0 8px 4px rgba(224,168,46,var(--hint-opacity,0.35)); } }
  #fuseRow { margin-bottom: 16px; display: flex; gap: 8px; align-items: center; }
  #fuseRow button { padding: 4px 10px; }
  #log { font-size: 12px; color: #aaa; background: #15181c; border-radius: 6px; padding: 8px; height: 120px; overflow-y: auto; }
  #spiritStatus { margin-bottom: 10px; font-size: 13px; }
  #recoveryCaption { font-size: 13px; color: #e07a5f; min-height: 16px; margin-bottom: 6px; }
  .section-title { font-size: 12px; color: #777; text-transform: uppercase; margin: 14px 0 4px; }
  .cell.flash-fail { background: #7a2020 !important; border-color: #c0392b !important; }
  .cell.flash-safe { background: #2a6e3f !important; border-color: #4A7C59 !important; }
  .cell.celebrate { animation: celebrate-pulse 1.4s ease-in-out 2; }
  @keyframes celebrate-pulse {
    0%, 100% { background: #2a6e3f; border-color: #4A7C59; }
    50% { background: #f2c14e; border-color: #f2c14e; }
  }
  .cell.hazard-pulse { background: #3a1f4a !important; border-color: #8e44ad !important; }

  #metaScreen.hidden, #puzzleScreen.hidden { display: none; }
  .actSection { margin-bottom: 22px; }
  .actSection .actTitle { font-size: 13px; color: #999; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
  .actSection.locked .actTitle { color: #555; }
  .tileRow { display: flex; gap: 10px; flex-wrap: wrap; }
  .tile { width: 64px; height: 64px; border-radius: 8px; background: #2a2f36; border: 1px solid #555;
          display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer;
          position: relative; color: #eee; }
  .tile.locked { cursor: not-allowed; color: #555; background: #23272d; border-color: #3a3f46; }
  .tile.complete { border-color: #4A7C59; }
  .tile .badge { position: absolute; font-size: 13px; }
  .tile .badge.lock { top: 2px; right: 4px; }
  .tile .badge.check { bottom: 2px; right: 4px; color: #4A7C59; }
  #backBtn { margin-bottom: 12px; padding: 4px 10px; background: #2a2f36; color: #ccc; border: 1px solid #444;
             border-radius: 4px; cursor: pointer; font-size: 12px; }
</style>
</head>
<body>
<h1>Hanzi Sandbox — Room Shell (Phase 3/9)</h1>
<div class="sub">Terrain + spirit + puzzle loader on top of the §2/§3 fusion prototype. Click two hand stamps to fuse them; click a stamp then a terrain cell to deploy it.</div>

<div id="metaScreen"></div>

<div id="puzzleScreen" class="hidden">
  <button id="backBtn">← Back to map</button>
  <div id="obstacle"></div>
  <div id="recoveryCaption"></div>
  <div id="spiritStatus"></div>
  <div id="terrainRow"></div>

  <div class="section-title">Hand</div>
  <div id="hand"></div>

  <div id="fuseRow">
    <button id="fuseBtn" disabled>Fuse selected (pick 2)</button>
    <button id="clearBtn">Clear selection</button>
    <span id="fuseHint" style="font-size:12px;color:#777;"></span>
  </div>

  <div class="section-title">Log</div>
  <div id="log"></div>
</div>

<!-- Existing fusion prototype (Phase 1/2) — UMD-style globals, loaded as classic scripts. Not modified. -->
<script src="recipes.js"></script>
<script src="fusion.js"></script>
<!-- Phase 3 additions — same UMD pattern as the files above for consistency. -->
<script src="data/constants.js"></script>
<script src="data/terrain.js"></script>
<script src="data/puzzles.js"></script>
<script src="engine/resolver.js"></script>
<script src="engine/spirit.js"></script>
<script src="engine/puzzleLoader.js"></script>

<script type="module">
  const HS = window.HanziSandbox;
  const { Recipes, Fusion } = HS;
  const { TERRAIN, makeCell } = HS.Terrain;
  const { resolveInteraction } = HS.Resolver;
  const Spirit = HS.Spirit;
  const { loadPuzzle } = HS.PuzzleLoader;
  const { PUZZLES } = HS.Puzzles;
  const { HINT_PULSE_MS, HINT_OPACITY, HINT_DELAY_MS, HAZARD_PULSE_MS } = HS.Constants;

  document.documentElement.style.setProperty("--hint-ms", HINT_PULSE_MS + "ms");
  document.documentElement.style.setProperty("--hint-opacity", HINT_OPACITY);

  const engine = new Fusion.FusionEngine();
  let session = null;     // { puzzle, terrain, spirit, hand, levelHasTimer, stampPool, lastActionTs, flashFailTile, flashSafeTile }
  // selectedStamps holds 0-2 charKeys for the fuse pair (duplicates allowed for self-pair recipes).
  // deployingStamp mirrors selectedStamps[0] only while exactly one stamp is selected — that single
  // selection doubles as "what gets placed if the player clicks a terrain cell next."
  let selectedStamps = [];
  let deployingStamp = null;
  let hazardIntervalId = null;

  const $metaScreen = document.getElementById("metaScreen");
  const $puzzleScreen = document.getElementById("puzzleScreen");
  const $backBtn = document.getElementById("backBtn");
  const $obstacle = document.getElementById("obstacle");
  const $recoveryCaption = document.getElementById("recoveryCaption");
  const $spiritStatus = document.getElementById("spiritStatus");
  const $terrainRow = document.getElementById("terrainRow");
  const $hand = document.getElementById("hand");
  const $fuseBtn = document.getElementById("fuseBtn");
  const $clearBtn = document.getElementById("clearBtn");
  const $fuseHint = document.getElementById("fuseHint");
  const $log = document.getElementById("log");

  function log(msg) {
    const line = document.createElement("div");
    line.textContent = msg;
    $log.prepend(line);
  }

  // Design Bible §9 / build CLAUDE.md "Progression & UI Layer". Act order is fixed
  // (Teach -> Choose -> Compound -> Constrain); each puzzle's *own* puzzle.act field
  // (already locked via D024/D028/D051) is the grouping key, not the static
  // id-list tables in CLAUDE.md/§9 — those two tables disagree with each other and
  // with puzzles.js (e.g. P08 is Compound per D024, not Choose; P06b is missing from
  // both tables). Grouping by the data's own act field is the only version that
  // matches what's actually implemented; flagged as D077 in the Bible rather than
  // guessing between the two stale tables.
  const ACT_ORDER = ["Teach", "Choose", "Compound", "Constrain"];

  // Per-puzzle fused character shown on its meta-screen tile (CLAUDE.md table).
  // P06b has no CLAUDE.md entry (added after that table was written, D051) — uses
  // 林, the first character taught on its small-gap tile.
  const TILE_CHAR = {
    P01: "冰", P02: "冰", P03: "火", P04: "火", P05: "明", P06: "星", P06b: "林",
    P07: "森", P08: "炎", P09: "冰", P10: "晶", P11: "岩", P12: "林", P13: "休",
    P14: "尖", P15: "？"
  };

  function completionKey(puzzleId) {
    return "hanzi_" + puzzleId.toLowerCase() + "_complete";
  }

  function isPuzzleComplete(puzzleId) {
    return localStorage.getItem(completionKey(puzzleId)) === "1";
  }

  function markPuzzleComplete(puzzleId) {
    localStorage.setItem(completionKey(puzzleId), "1");
  }

  // Groups PUZZLES by act, preserving ACT_ORDER and each puzzle's position in PUZZLES.
  function groupPuzzlesByAct() {
    const groups = {};
    ACT_ORDER.forEach(function (act) { groups[act] = []; });
    PUZZLES.forEach(function (p) { if (groups[p.act]) groups[p.act].push(p); });
    return groups;
  }

  // Teach is always unlocked; each subsequent act unlocks once every puzzle in the
  // act before it is complete (Design Bible §9 "Sequencing").
  function isActUnlocked(actIndex, groups) {
    if (actIndex === 0) return true;
    const prevAct = ACT_ORDER[actIndex - 1];
    return groups[prevAct].every(function (p) { return isPuzzleComplete(p.id); });
  }

  function showMetaScreen() {
    $puzzleScreen.classList.add("hidden");
    $metaScreen.classList.remove("hidden");
    renderMetaScreen();
  }

  function showPuzzleScreen() {
    $metaScreen.classList.add("hidden");
    $puzzleScreen.classList.remove("hidden");
  }

  function renderMetaScreen() {
    $metaScreen.innerHTML = "";
    const groups = groupPuzzlesByAct();

    ACT_ORDER.forEach(function (act, actIndex) {
      const unlocked = isActUnlocked(actIndex, groups);
      const section = document.createElement("div");
      section.className = "actSection" + (unlocked ? "" : " locked");

      const title = document.createElement("div");
      title.className = "actTitle";
      title.textContent = act;
      section.appendChild(title);

      const row = document.createElement("div");
      row.className = "tileRow";
      groups[act].forEach(function (p) {
        const complete = isPuzzleComplete(p.id);
        const tile = document.createElement("div");
        tile.className = "tile" + (unlocked ? "" : " locked") + (complete ? " complete" : "");
        tile.textContent = TILE_CHAR[p.id] || "?";

        if (!unlocked) {
          const lockBadge = document.createElement("span");
          lockBadge.className = "badge lock";
          lockBadge.textContent = "🔒";
          tile.appendChild(lockBadge);
        } else if (complete) {
          const checkBadge = document.createElement("span");
          checkBadge.className = "badge check";
          checkBadge.textContent = "✓";
          tile.appendChild(checkBadge);
        }

        tile.onclick = function () {
          if (!unlocked) return;
          startPuzzle(p);
          showPuzzleScreen();
        };
        row.appendChild(tile);
      });
      section.appendChild(row);
      $metaScreen.appendChild(section);
    });
  }

  $backBtn.onclick = function () {
    if (hazardIntervalId) {
      clearInterval(hazardIntervalId);
      hazardIntervalId = null;
    }
    showMetaScreen();
  };

  // CLAUDE.md "Completion": spirit reaches goal (final tile, solved) -> write the
  // localStorage flag. Detected here in the UI layer (not engine/*.js) by watching
  // session state after each successful deploy, per "do not alter puzzle engine logic."
  function checkCompletion() {
    if (!session || session.completedThisRun) return;
    const lastTile = session.terrain.length - 1;
    if (session.spirit.position.tile === lastTile && session.solvedTiles.has(lastTile)) {
      session.completedThisRun = true;
      markPuzzleComplete(session.puzzle.id);
      log(session.puzzle.id + " complete — spirit reached the goal.");

      // D081: brief celebration before the back button becomes the obvious next
      // action — tile glow + caption, no modal, no scoring.
      session.celebrateTile = lastTile;
      $recoveryCaption.textContent = "✓ puzzle complete!";
      renderTerrain();
      setTimeout(function () {
        if (session) {
          session.celebrateTile = null;
          $recoveryCaption.textContent = "";
          renderTerrain();
        }
      }, 2800);
    }
  }

  function startPuzzle(puzzleDef) {
    if (hazardIntervalId) {
      clearInterval(hazardIntervalId);
      hazardIntervalId = null;
    }

    session = loadPuzzle(puzzleDef);
    session.stampPool = new Fusion.StampPool(
      puzzleDef.act === "Constrain" ? "depletion" : "infinite",
      puzzleDef.act === "Constrain" ? session.hand : null
    );
    session.lastActionTs = Date.now();
    session.flashFailTile = null;
    session.flashSafeTile = null;
    session.flashHazardTile = null;
    session.celebrateTile = null;
    session.solvedTiles = new Set();
    session.completedThisRun = false;
    selectedStamps = [];
    deployingStamp = null;
    $recoveryCaption.textContent = "";
    log("Loaded " + puzzleDef.id + " (" + puzzleDef.act + "): " + puzzleDef.obstacle);

    if (puzzleDef.hazardLoop) {
      const activeSession = session;
      hazardIntervalId = setInterval(function () { hazardPulse(activeSession); }, HAZARD_PULSE_MS);
    }

    renderAll();
  }

  // D065: shadow hazard for P13's hazardLoop puzzles. Pulses on a fixed interval
  // (HAZARD_PULSE_MS, constants.js) regardless of player action. If the hazard's
  // tile is already solved (明 cleared it), the hazard is inert. Otherwise: spirit
  // paused (休 active) -> pulse passes safely; not paused -> 1 HP backfire damage.
  function hazardPulse(targetSession) {
    if (session !== targetSession) return;
    const tileIndex = targetSession.terrain.findIndex(function (c) { return c.type === TERRAIN.DARKNESS; });
    if (tileIndex === -1 || targetSession.solvedTiles.has(tileIndex)) return;

    targetSession.flashHazardTile = tileIndex;
    renderTerrain();

    if (targetSession.spirit.state === "paused") {
      log("Hazard pulse passed safely — spirit resting (休).");
    } else {
      const result = Spirit.takeBackfireDamage(targetSession.spirit);
      if (result.damaged) log("Hazard pulse hit the spirit — 1 HP damage (hp " + result.hp + ").");
      else log("Hazard pulse hit but was absorbed (" + result.reason + ").");
      renderSpiritStatus();
    }

    setTimeout(function () {
      if (session === targetSession) {
        targetSession.flashHazardTile = null;
        renderTerrain();
      }
    }, 400);
  }

  function renderAll() {
    renderObstacle();
    renderSpiritStatus();
    renderTerrain();
    renderHand();
  }

  function renderObstacle() {
    // D076/D081: notes is internal authoring context (red herring rationale, etc.)
    // and must never reach player-visible UI — obstacle text only.
    $obstacle.textContent = session ? session.puzzle.obstacle : "Pick a puzzle to begin.";
  }

  function renderSpiritStatus() {
    if (!session) { $spiritStatus.textContent = ""; return; }
    const s = session.spirit;
    $spiritStatus.textContent = "Spirit: tile " + s.position.tile + " · state " + s.state +
      " · hp " + s.hp + (s.activeBuff ? " · buff " + s.activeBuff.type + (s.activeBuff.consumed ? " (spent)" : "") : "");
  }

  function renderTerrain() {
    $terrainRow.innerHTML = "";
    if (!session) return;
    session.terrain.forEach(function (cell, i) {
      const div = document.createElement("div");
      div.className = "cell cell-" + cell.type +
        (session.spirit.position.tile === i ? " spirit-here" : "") +
        (session.flashFailTile === i ? " flash-fail" : "") +
        (session.flashSafeTile === i ? " flash-safe" : "") +
        (session.flashHazardTile === i ? " hazard-pulse" : "") +
        (session.celebrateTile === i ? " celebrate" : "");
      div.innerHTML = '<div class="label">' + cell.type + '</div>' +
        (cell.modifiedBy ? '<div class="mod">' + cell.modifiedBy + '</div>' : '');
      div.onclick = function () { deployOnCell(i); };
      $terrainRow.appendChild(div);
    });
  }

  // D041 fix: a recipe whose inputs are the same char twice (火+火, 木+木, 月+月, 朋+朋).
  function isSelfPairable(charKey) {
    return Recipes.RECIPES.some(function (r) {
      return r.inputs.length === 2 && r.inputs[0] === charKey && r.inputs[1] === charKey;
    });
  }

  // Counts how many of charKey are already held in selectedStamps (0, 1, or 2).
  function selectedCount(charKey) {
    return selectedStamps.filter(function (c) { return c === charKey; }).length;
  }

  function renderHand() {
    $hand.innerHTML = "";
    if (!session) return;

    const handChars = Object.keys(session.hand);
    // Hint sparkle (D036, D042, D043): pulse radicals that are inputs to a recipe
    // relevant to the current puzzle's solutions, only after HINT_DELAY_MS of inactivity.
    const hintChars = computeHintChars(handChars);

    handChars.forEach(function (charKey) {
      const count = session.stampPool.count(charKey);
      const selected = selectedCount(charKey);
      const depleted = count <= 0 || selected >= count;
      const div = document.createElement("div");
      div.className = "stamp" + (selected > 0 ? " selected" : "") +
        (depleted ? " depleted" : "") + (hintChars.has(charKey) ? " hint" : "");
      div.textContent = charKey;
      if (isSelfPairable(charKey)) {
        const pairBadge = document.createElement("span");
        pairBadge.className = "pair-badge";
        pairBadge.textContent = "×2";
        div.appendChild(pairBadge);
      }
      if (count !== Infinity) {
        const countSpan = document.createElement("span");
        countSpan.className = "count";
        countSpan.textContent = count;
        div.appendChild(countSpan);
      }
      div.onclick = function () { if (!depleted) onStampClick(charKey); };
      $hand.appendChild(div);
    });

    $fuseBtn.disabled = selectedStamps.length !== 2;
    $fuseHint.textContent = deployingStamp ? "Deploying " + deployingStamp + " — click a terrain cell, or select another stamp to fuse." : "";
  }

  // D055: tile indices not yet successfully resolved (no ✓ outcome applied yet).
  function getUnsolvedTileIndices() {
    const unsolved = [];
    session.terrain.forEach(function (cell, i) {
      if (!session.solvedTiles.has(i)) unsolved.push(i);
    });
    return unsolved;
  }

  // D043/D055: only pulse radicals that contribute to a recipe relevant to a
  // still-unsolved obstacle tile in the current puzzle's valid solutions —
  // solution entries for already-solved tiles no longer count.
  function getAcceptedChars(unsolvedTiles) {
    const accepted = new Set();
    (session.puzzle.validSolutions || []).forEach(function (solution) {
      solution.forEach(function (c, idx) {
        if (unsolvedTiles.includes(idx)) accepted.add(c);
      });
    });
    return accepted;
  }

  function computeHintChars(handChars) {
    // D042: no sparkle until the player has been inactive for HINT_DELAY_MS.
    if (Date.now() - session.lastActionTs < HINT_DELAY_MS) return new Set();

    const accepted = getAcceptedChars(getUnsolvedTileIndices());
    const result = new Set();
    Recipes.RECIPES.forEach(function (recipe) {
      if (recipe.inputs.length !== 2) return;
      if (!accepted.has(recipe.char)) return;
      const need = recipe.inputs[0] === recipe.inputs[1] ? 2 : 1;
      const have = recipe.inputs.every(function (input, idx) {
        if (!handChars.includes(input)) return false;
        const required = recipe.inputs[0] === recipe.inputs[1] ? need : 1;
        return session.stampPool.count(input) >= required;
      });
      if (have) recipe.inputs.forEach(function (input) { result.add(input); });
    });
    return result;
  }

  // D041 fix: selectedStamps can hold the same charKey twice when the pool has
  // >= 2 of it, so self-pair recipes (火+火, 木+木, 月+月, 朋+朋) are reachable.
  // D053: stamp select/deselect no longer resets the inactivity timer — only
  // fuse and deploy (actual progress-making actions) do.
  function onStampClick(charKey) {
    if (selectedStamps.length >= 2) {
      selectedStamps = [charKey];
      deployingStamp = charKey;
      renderHand();
      return;
    }

    if (selectedStamps.length === 1) {
      const isSamePair = selectedStamps[0] === charKey;
      const available = session.stampPool.count(charKey);
      if (isSamePair && available < 2) {
        // Not enough stock to self-pair — restart selection on this stamp instead.
        selectedStamps = [charKey];
        deployingStamp = charKey;
      } else {
        selectedStamps.push(charKey);
        deployingStamp = null; // two stamps selected -> fuse mode, not single-deploy
      }
      renderHand();
      return;
    }

    selectedStamps = [charKey];
    deployingStamp = charKey;
    renderHand();
  }

  $clearBtn.onclick = function () {
    selectedStamps = [];
    deployingStamp = null;
    renderHand();
  };

  $fuseBtn.onclick = function () {
    if (selectedStamps.length !== 2) return;
    session.lastActionTs = Date.now();
    const result = engine.fuse(selectedStamps[0], selectedStamps[1], session.stampPool);
    if (!result.ok) {
      log("Fuse failed: " + selectedStamps.join("+") + " (" + result.reason + ")");
    } else {
      log("Fused " + selectedStamps.join("+") + " -> " + result.recipe.char + " (" + result.recipe.gloss + ")");
      if (session.hand[result.recipe.char] === undefined) session.hand[result.recipe.char] = session.stampPool.count(result.recipe.char);
    }
    selectedStamps = [];
    deployingStamp = null;
    renderAll();
  };

  function deployOnCell(tileIndex) {
    if (!deployingStamp || !session) return;
    const charKey = deployingStamp;
    const cell = session.terrain[tileIndex];
    const result = resolveInteraction(charKey, cell, session.levelHasTimer);
    log("Deployed " + charKey + " on " + cell.type + " (tile " + tileIndex + "): " + result.symbol + " " + result.outcome);

    session.lastActionTs = Date.now();
    const outcome = applyOutcome(charKey, cell, tileIndex, result);
    selectedStamps = [];
    deployingStamp = null;

    if (outcome && outcome.fallTriggered) {
      triggerFallRecovery(tileIndex);
    } else {
      checkCompletion();
      renderAll();
    }
  }

  function applyOutcome(charKey, cell, tileIndex, result) {
    const stateClasses = { "休": "rest", "好": "damage_immunity", "安": "fall_immunity" };
    if (stateClasses[charKey]) {
      // bug report: state stamps (休/好/安) were returning before the
      // depletion-mode stampPool.take() below ever ran, so Constrain act
      // never consumed them. Spend the stamp here first.
      if (session.stampPool.mode === "depletion") {
        if (session.stampPool.has(charKey, 1)) session.stampPool.take(charKey, 1);
      }
      if (charKey === "休") {
        const restDurationMs = 5000;
        const restSpirit = session.spirit;
        Spirit.applyRest(restSpirit, restDurationMs);
        setTimeout(function () {
          Spirit.clearPause(restSpirit);
          if (session && session.spirit === restSpirit) renderSpiritStatus();
        }, restDurationMs);
      } else {
        Spirit.applyBuff(session.spirit, charKey, stateClasses[charKey]);
      }
      return { fallTriggered: false };
    }

    if (session.stampPool.mode === "depletion") {
      if (session.stampPool.has(charKey, 1)) session.stampPool.take(charKey, 1);
    }

    if (result.symbol === "✓") {
      // D079: only a confirmed solve marks the cell modified — ✗/~ outcomes
      // still spend the stamp above but must not poison §4b char×char lookups.
      cell.state = "modified";
      cell.modifiedBy = charKey;
      session.solvedTiles.add(tileIndex);
      if (session.spirit.position.tile === tileIndex || tileIndex === session.spirit.position.tile + 1) {
        session.spirit.position.tile = tileIndex;
        Spirit.markSafe(session.spirit);
      }
      return { fallTriggered: false };
    }
    if (result.outcome === "fire_burns_raft_fall" || result.outcome === "fire_melts_bridge_fall") {
      return { fallTriggered: true };
    }
    return { fallTriggered: false };
  }

  // D046: red flash on the failed tile, then snap back to the last safe tile with
  // a brief green highlight there, plus a caption. Total under 1s, per spec.
  function triggerFallRecovery(failedTile) {
    session.flashFailTile = failedTile;
    $recoveryCaption.textContent = "⚠ returned to safe ground";
    renderAll();

    setTimeout(function () {
      session.flashFailTile = null;
      Spirit.fall(session.spirit);
      session.flashSafeTile = session.spirit.position.tile;
      renderAll();

      setTimeout(function () {
        session.flashSafeTile = null;
        $recoveryCaption.textContent = "";
        renderTerrain();
      }, 350);
    }, 300);
  }

  // D042: hint sparkle is inactivity-driven, so it must re-evaluate on a timer,
  // not only on click — otherwise it never appears for a player who sits idle.
  setInterval(function () { if (session) renderHand(); }, 500);

  showMetaScreen();
</script>
</body>
</html>
